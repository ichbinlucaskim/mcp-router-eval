# Default experiment configuration. Consumed later by scripts/ entrypoints.
# Scaffolding placeholder — values are conventions, not yet wired to code.

benchmark: toollinkos          # sole primary benchmark (ADR 0001)

embedding:
  provider: local_bge          # LocalEmbedder(BGE) default; openai=ada-002 optional (ADR 0003)
  model: BAAI/bge-base-en-v1.5
  cache: true
  version_tag: bge-base-en-v1.5

graph:
  num_relations: 4             # param x {direct,indirect}, tool x {direct,indirect} (ADR 0006)
  is_core_as_feature: true     # "core" is a node feature, not an edge (ADR 0006)

routers:
  - bm25
  - naive_rag
  - hybrid_rag
  - graphrag_traversal
  - graphsage
  - rgcn

eval:
  k_values: [10, 20]
  ndcg_k: 10
  seeds: [0, 1, 2, 3, 4]
  slices:                      # closure-depth buckets (ADR 0005)
    shallow: [2, 3]
    deep_min: 6

executor:
  kind: claude_agent_sdk       # Claude Code via claude-agent-sdk (ADR 0002)
  completion: structural_proxy # correct tool set + dep order + type-valid args (ADR 0004)
